<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography — Colorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body id="top">
  <div class="page">
    <header>
      <h1>
        <a href="/travels/" class="home-link">Luke Chapman</a>
      </h1>
      <nav>
        <a href="/travels/">Travels</a>
        <a href="/colorado/" class="active">Colorado</a>
      </nav>
    </header>

    <section>
      <div class="grid">

        <a class="folder" href="/colorado/breckenridge/">
          <img src="https://res.cloudinary.com/dkarbzpvo/image/upload/v1774225122/7R306614-2_ltstpm.jpg">
          <div class="folder-title">Breckenridge</div>
          <div class="folder-date">August, 2022</div>
        </a>

        <a class="folder" href="/colorado/rmnp/">
          <img src="https://res.cloudinary.com/dkarbzpvo/image/upload/v1774194599/7R303002_svaw3s.jpg">
          <div class="folder-title">Rocky Mountain National Park</div>
          <div class="folder-date">July, 2025</div>
        </a>

      </div>

      <div class="bottom-meta">
        <a href="#top" class="back-to-top">Back to top ↑</a>

        <div class="full-divider"></div>

        <div class="footer">
          <div class="footer-left">Contact:</div>
          <div class="footer-right">
            <a href="https://instagram.com/_l.chap" target="_blank" class="contact-link">Instagram</a>
            <a href="mailto:lukeallenchapman@gmail.com" class="contact-link">Email</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    document.querySelectorAll('.back-to-top').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    document.querySelectorAll('.folder img').forEach(img => {
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        img.onload = () => img.classList.add('loaded');
      }
    });
  </script>
</body>
</html>
