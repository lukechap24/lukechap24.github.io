<!doctype html>
<html lang="en">
<head>

  <title>Luke Chapman Photography — Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body id="top">
  <div class="page">
   <header>
    <h1>
      <a href="travels.html" class="home-link">Luke Chapman</a>

    <nav>
        <a href="travels.html" class="active">Travels</a>
        <a href="colorado.html">Colorado</a>
      </nav>
    </header>

    <section>
      <div class="grid">
        <a class="folder" href="gallery.html?gallery=patagonia">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/sample.jpg" alt="Patagonia thumbnail">
          <div class="folder-title">Patagonia</div>

          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/animals/reindeer.jpg" alt="Iceland thumbnail">

      <div class="footer">
        <div class="footer-left">Contact</div>
      
        <div class="footer-right">
          <a href="https://instagram.com/_l.chap" target="_blank" class="contact-link">
            Instagram
          </a>
      
          <a href="mailto:lukeallenchapman@gmail.com" class="contact-link">
            Email
          </a>
        </div>
      </div>

  <script>
    document.querySelectorAll('.back-to-top').forEach(function(button) {
      button.addEventListener('click', function(event) {
        event.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
