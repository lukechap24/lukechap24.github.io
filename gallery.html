<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body id="top">
  <div class="page">
    <header>
      <h1>
        <a href="travels.html" class="home-link">Luke Chapman</a>
      </h1>
      <nav>
        <a href="travels.html" id="travels-link">Travels</a>
        <a href="colorado.html" id="colorado-link">Colorado</a>
      </nav>
    </header>

    <section>
      <a href="#" id="back-link" class="back-link">← Back</a>

      <div class="gallery-heading">
        <div class="gallery-title" id="gallery-title"></div>
        <div class="gallery-subtitle" id="gallery-subtitle"></div>
      </div>

      <div class="thumb-grid" id="thumb-grid"></div>

      <div class="bottom-meta">
        <a href="#top" class="back-to-top">Back to top ↑</a>
        <div class="full-divider"></div>

        <div class="footer">
          <div class="footer-left">Contact</div>
          <div class="footer-right">
            <a href="https://instagram.com/_l.chap" target="_blank" class="contact-link">Instagram</a>
            <a href="mailto:lukeallenchapman@gmail.com" class="contact-link">Email</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-top">
      <div id="lightbox-title"></div>
      <button id="close-lightbox" class="lightbox-close" aria-label="Close lightbox">✕</button>
    </div>

    <div class="lightbox-content">
      <button id="prev" class="lightbox-arrow" aria-label="Previous image">‹</button>

      <div class="lightbox-image-wrap">
        <img id="lightbox-img" class="lightbox-image" alt="">
      </div>

      <button id="next" class="lightbox-arrow" aria-label="Next image">›</button>
    </div>
  </div>

  <script>
    function getGalleryKey() {
      const params = new URLSearchParams(window.location.search);
      return params.get("gallery");
    }

    function getSection() {
      const params = new URLSearchParams(window.location.search);
      return params.get("section");
    }

    function loadGalleryScript(section, galleryKey) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = `galleries/${section}/${galleryKey}.js`;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function makeThumb(url) {
      return url.replace(
        "/upload/",
        "/upload/w_400,h_500,c_fill,q_auto,f_auto/"
      );
    }

    function makeFull(url) {
      return url.replace(
        "/upload/",
        "/upload/w_1400,q_auto,f_auto/"
      );
    }

    const thumbGrid = document.getElementById("thumb-grid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const backLink = document.getElementById("back-link");
    const closeLightboxBtn = document.getElementById("close-lightbox");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const travelsLink = document.getElementById("travels-link");
    const coloradoLink = document.getElementById("colorado-link");

    let currentIndex = 0;
    let isTransitioning = false;
    const preloadedImages = new Map();

    function preloadImage(src) {
      if (preloadedImages.has(src)) return preloadedImages.get(src);

      const img = new Image();
      const promise = new Promise((resolve) => {
        img.onload = () => resolve(src);
        img.onerror = () => resolve(src);
      });

      img.src = src;
      preloadedImages.set(src, promise);
      return promise;
    }

    function preloadNeighbors(index) {
      if (!gallery || !gallery.photos || !gallery.photos.length) return;

      const prevIndex = (index - 1 + gallery.photos.length) % gallery.photos.length;
      const nextIndex = (index + 1) % gallery.photos.length;

      preloadImage(makeFull(gallery.photos[prevIndex]));
      preloadImage(makeFull(gallery.photos[nextIndex]));
    }

    function renderThumbnails() {
      thumbGrid.innerHTML = "";

      gallery.photos.forEach((photoUrl, index) => {
        const thumb = document.createElement("div");
        thumb.className = "thumb";

        const img = document.createElement("img");
        img.src = makeThumb(photoUrl);
        img.loading = "lazy";
        img.alt = `${gallery.title} photograph ${index + 1}`;

        img.addEventListener("load", function () {
          img.classList.add("loaded");
        });

        thumb.appendChild(img);
        thumb.addEventListener("click", function () {
          openLightbox(index);
        });

        thumbGrid.appendChild(thumb);
      });
    }

    async function updateLightboxImage(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      currentIndex = index;
      const newSrc = makeFull(gallery.photos[currentIndex]);

      lightbox.classList.add("is-loading");
      prevBtn.disabled = true;
      nextBtn.disabled = true;

      await preloadImage(newSrc);

      lightboxImg.classList.remove("loaded");
      lightboxImg.classList.add("fade-out");

      requestAnimationFrame(() => {
        lightboxImg.onload = function () {
          lightboxImg.classList.remove("fade-out");
          lightboxImg.classList.add("loaded");

          lightbox.classList.remove("is-loading");
          prevBtn.disabled = false;
          nextBtn.disabled = false;
          isTransitioning = false;

          preloadNeighbors(currentIndex);
        };

        lightboxImg.src = newSrc;
        lightboxImg.alt = `${gallery.title} photograph ${currentIndex + 1}`;
      });
    }

    function openLightbox(index) {
      lightbox.classList.add("open");
      updateLightboxImage(index);
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
    }

    function showPrevImage() {
      const nextIndex =
        (currentIndex - 1 + gallery.photos.length) % gallery.photos.length;
      updateLightboxImage(nextIndex);
    }

    function showNextImage() {
      const nextIndex = (currentIndex + 1) % gallery.photos.length;
      updateLightboxImage(nextIndex);
    }

    async function initGallery() {
      const galleryKey = getGalleryKey();
      const section = getSection();

      await loadGalleryScript(section, galleryKey);

      document.title = `Luke Chapman Photography — ${gallery.title}`;
      document.getElementById("gallery-title").textContent = gallery.title;
      document.getElementById("gallery-subtitle").textContent =
        `${gallery.date} · ${gallery.photos.length} photographs`;
      document.getElementById("lightbox-title").textContent = gallery.title;

      backLink.href = `${section}.html`;

      if (section === "travels") {
        travelsLink.classList.add("active");
      } else if (section === "colorado") {
        coloradoLink.classList.add("active");
      }

      renderThumbnails();
    }

    backLink.addEventListener("click", function (event) {
      const section = getSection();
      if (section) {
        event.preventDefault();
        window.location.href = `${section}.html`;
      }
    });

    closeLightboxBtn.addEventListener("click", closeLightbox);
    prevBtn.addEventListener("click", showPrevImage);
    nextBtn.addEventListener("click", showNextImage);

    document.addEventListener("keydown", function (event) {
      if (!lightbox.classList.contains("open")) return;

      if (event.key === "Escape") {
        closeLightbox();
      } else if (event.key === "ArrowLeft") {
        showPrevImage();
      } else if (event.key === "ArrowRight") {
        showNextImage();
      }
    });

    lightbox.addEventListener("click", function (event) {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.querySelectorAll(".back-to-top").forEach(function (button) {
      button.addEventListener("click", function (event) {
        event.preventDefault();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    initGallery();
  </script>
</body>
</html>
