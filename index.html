<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #111;
    }

    .page {
      max-width: 950px;
      margin: 0 auto;
      padding: 30px 20px 50px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    nav a,
    .gallery-link,
    .back-link {
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    nav a {
      margin-left: 15px;
    }

    nav a:hover,
    .gallery-link:hover,
    .back-link:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .gallery-title {
      font-size: 16px;
      font-weight: 600;
      margin: 18px 0 4px;
    }

    .gallery-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .thumb {
      aspect-ratio: 4 / 5;
      background: #efefef;
      border: 1px solid #e4e4e4;
      overflow: hidden;
      cursor: pointer;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .about {
      margin-top: 50px;
      padding-top: 15px;
      border-top: 1px solid #eaeaea;
      max-width: 600px;
      font-size: 14px;
      color: #666;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.96);
      z-index: 1000;
      padding: 20px;
    }

    .lightbox.open {
      display: flex;
      flex-direction: column;
    }

    .lightbox-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .lightbox-close {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      color: #111;
    }

    .lightbox-content {
      flex: 1;
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      align-items: center;
      gap: 10px;
      min-height: 0;
    }

    .lightbox-arrow {
      background: none;
      border: none;
      font-size: 36px;
      color: #666;
      cursor: pointer;
    }

    .lightbox-image-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
    }

    .lightbox-image {
      max-width: 100%;
      max-height: 75vh;
      display: block;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    .lightbox-image.fade-out {
      opacity: 0;
    }

    @media (max-width: 700px) {
      .thumb-grid {
        grid-template-columns: 1fr;
      }

      .lightbox-content {
        grid-template-columns: 40px 1fr 40px;
      }

      .lightbox-arrow {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Luke Chapman</h1>
      <nav>
        <a href="#" id="home-link">Travels</a>
        <a href="#">Moments</a>
      </nav>
    </header>

    <section id="home-view" class="view active">
      <div class="section-title">Travels</div>
      <div class="gallery-list">
        <a class="gallery-link" href="#" id="patagonia-link">Patagonia - February, 2026</a>
        <a class="gallery-link" href="#">Japan - October, 2025</a>
        <a class="gallery-link" href="#">Iceland - June, 2025</a>
      </div>

      <div class="about">
        Minimal travel and portrait photography.
      </div>
    </section>

    <section id="gallery-view" class="view">
      <a class="back-link" href="#" id="back-link">← Back</a>
      <div class="gallery-title">Patagonia - February, 2026</div>
      <div class="gallery-subtitle">6 photographs</div>

      <div class="thumb-grid" id="thumb-grid">
        <div class="thumb" data-index="0">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/sample.jpg" alt="Patagonia photo">
        </div>
        <div class="thumb" data-index="1">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/landscapes/nature-mountains.jpg" alt="Patagonia photo">
        </div>
        <div class="thumb" data-index="2">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/animals/reindeer.jpg" alt="Patagonia photo">
        </div>
        <div class="thumb" data-index="3">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/people/smiling-man.jpg" alt="Patagonia photo">
        </div>
        <div class="thumb" data-index="4">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/sheep.jpg" alt="Patagonia photo">
        </div>
        <div class="thumb" data-index="5">
          <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/landscapes/beach-boat.jpg" alt="Patagonia photo">
        </div>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-top">
      <div>Patagonia - February, 2026</div>
      <button class="lightbox-close" id="close-lightbox">Close</button>
    </div>

    <div class="lightbox-content">
      <button class="lightbox-arrow" id="prev-button">&#8249;</button>

      <div class="lightbox-image-wrap">
        <img class="lightbox-image" id="lightbox-image" src="" alt="">
      </div>

      <button class="lightbox-arrow" id="next-button">&#8250;</button>
    </div>
  </div>

  <script>
    const homeView = document.getElementById('home-view');
    const galleryView = document.getElementById('gallery-view');

    const patagoniaLink = document.getElementById('patagonia-link');
    const backLink = document.getElementById('back-link');
    const homeLink = document.getElementById('home-link');

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const closeLightbox = document.getElementById('close-lightbox');
    const prevButton = document.getElementById('prev-button');
    const nextButton = document.getElementById('next-button');

    const photos = [
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/sample.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/sample.jpg'
      },
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/samples/landscapes/nature-mountains.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/samples/landscapes/nature-mountains.jpg'
      },
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/samples/animals/reindeer.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/samples/animals/reindeer.jpg'
      },
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/samples/people/smiling-man.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/samples/people/smiling-man.jpg'
      },
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/samples/sheep.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/samples/sheep.jpg'
      },
      {
        thumb: 'https://res.cloudinary.com/demo/image/upload/w_800/samples/landscapes/beach-boat.jpg',
        full: 'https://res.cloudinary.com/demo/image/upload/w_1600/samples/landscapes/beach-boat.jpg'
      }
    ];

    let currentPhotoIndex = 0;
    let isTransitioning = false;

    function showHome() {
      homeView.classList.add('active');
      galleryView.classList.remove('active');
    }

    function showGallery() {
      homeView.classList.remove('active');
      galleryView.classList.add('active');
    }

    function openLightbox(index) {
      currentPhotoIndex = index;
      lightboxImage.src = photos[currentPhotoIndex].full;
      lightboxImage.alt = 'Patagonia photo';
      lightbox.classList.add('open');
    }

    function closeLightboxFn() {
      lightbox.classList.remove('open');
    }

    function changePhoto(newIndex) {
      if (isTransitioning) return;

      isTransitioning = true;
      lightboxImage.classList.add('fade-out');

      setTimeout(function() {
        currentPhotoIndex = newIndex;
        lightboxImage.src = photos[currentPhotoIndex].full;
        lightboxImage.alt = 'Patagonia photo';

        lightboxImage.onload = function() {
          lightboxImage.classList.remove('fade-out');
          isTransitioning = false;
          lightboxImage.onload = null;
        };
      }, 180);
    }

    function showNextPhoto() {
      const newIndex = (currentPhotoIndex + 1) % photos.length;
      changePhoto(newIndex);
    }

    function showPrevPhoto() {
      const newIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
      changePhoto(newIndex);
    }

    patagoniaLink.addEventListener('click', function(event) {
      event.preventDefault();
      showGallery();
    });

    backLink.addEventListener('click', function(event) {
      event.preventDefault();
      showHome();
    });

    homeLink.addEventListener('click', function(event) {
      event.preventDefault();
      showHome();
    });

    document.querySelectorAll('.thumb').forEach(function(thumb) {
      thumb.addEventListener('click', function() {
        const index = Number(this.dataset.index);
        openLightbox(index);
      });
    });

    closeLightbox.addEventListener('click', closeLightboxFn);
    nextButton.addEventListener('click', showNextPhoto);
    prevButton.addEventListener('click', showPrevPhoto);

    document.addEventListener('keydown', function(event) {
      if (!lightbox.classList.contains('open')) return;

      if (event.key === 'Escape') {
        closeLightboxFn();
      }

      if (event.key === 'ArrowRight') {
        showNextPhoto();
      }

      if (event.key === 'ArrowLeft') {
        showPrevPhoto();
      }
    });

    lightbox.addEventListener('click', function(event) {
      if (event.target === lightbox) {
        closeLightboxFn();
      }
    });
  </script>
</body>
</html>
