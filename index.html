<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Manrope, Arial, sans-serif;
    }

    body {
      color: white;
      background-color: #111;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }

    .splash {
      position: relative;
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    .hero-content {
      position: absolute;
      top: 41%;
      left: 29%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .site-title {
      margin: 0 0 22px;
      font-size: 2.25rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.18);
    }

    .enter-button {
      display: inline-block;
      padding: 11px 22px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.04);
      transition:
        background 0.22s ease,
        color 0.22s ease,
        border-color 0.22s ease,
        transform 0.22s ease;
    }

    .enter-button:hover {
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      border-color: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }

    @media (max-width: 1100px) {
      .hero-content {
        left: 32%;
        top: 43%;
      }
    }

    @media (max-width: 800px) {
      .hero-content {
        left: 50%;
        top: 44%;
      }

      .site-title {
        font-size: 1.9rem;
      }
    }

    @media (max-width: 560px) {
      .hero-content {
        width: calc(100% - 48px);
        left: 50%;
        top: 46%;
      }

      .site-title {
        font-size: 1.65rem;
        margin-bottom: 18px;
      }

      .enter-button {
        padding: 10px 20px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <main class="splash">
    <div class="hero-content">
      <h1 class="site-title">Luke Chapman</h1>
      <a class="enter-button" href="/home/">Howdy, come on in</a>
    </div>
  </main>

  <script src="/js/featured-images.js"></script>
  <script>
    const featuredImages = Array.isArray(window.featuredImages) ? window.featuredImages : [];

    if (featuredImages.length) {
      const randomIndex = Math.floor(Math.random() * featuredImages.length);
      const randomImage = featuredImages[randomIndex];
      document.body.style.backgroundImage = `url("${randomImage}")`;
    }
  </script>
</body>
</html>
