<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #111;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gallery-link {
      text-decoration: none;
      color: #111;
      font-size: 15px;
    }

    .gallery-link:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <div class="page">

    <header>
      <h1>Luke Chapman</h1>
      <nav>
        <a href="#">Travels</a>
        <a href="#">Moments</a>
      </nav>
    </header>

    <div class="section-title">Travels</div>

    <div class="gallery-list">
      <a class="gallery-link" href="#">Patagonia - February, 2026</a>
      <a class="gallery-link" href="#">Japan - October, 2025</a>
      <a class="gallery-link" href="#">Iceland - June, 2025</a>
    </div>

  </div>
</body>
</html>
