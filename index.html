<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>

  <!-- Example softer fonts (you can switch later) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Playfair Display', serif; background: white; color: #111; }
    .page { max-width: 1000px; margin: 0 auto; padding: 30px 20px 60px; }

    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 20px; font-weight: 500; margin: 0 0 10px; }

    nav a { margin: 0 10px; text-decoration: none; color: #999; }
    nav a.active { color: #111; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
    .folder { text-align: center; cursor: pointer; }

    .folder img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s ease;
    }

    .folder:hover img { opacity: 0.7; }

    .folder-title { margin-top: 10px; font-size: 15px; }
    .folder-date { font-size: 12px; color: #999; margin-top: 4px; }

    .view { display: none; }
    .view.active { display: block; }

    .back-link { display: inline-block; margin-bottom: 16px; text-decoration: none; color: #111; }

    .gallery-heading { margin-bottom: 18px; }
    .gallery-title { font-size: 16px; font-weight: 500; }
    .gallery-subtitle { font-size: 13px; color: #999; }

    .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .thumb { aspect-ratio: 4 / 5; overflow: hidden; cursor: pointer; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 1000; padding: 20px; }
    .lightbox.open { display: flex; flex-direction: column; }

    .lightbox-content {
      flex: 1;
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .lightbox-image { max-width: 100%; max-height: 75vh; display: block; }

    /* FULL WIDTH DIVIDER */
    .full-divider {
      width: 100vw;
      height: 1px;
      background: #eee;
      margin: 60px 0 20px;
      margin-left: calc(-50vw + 50%);
    }

    /* BACK TO TOP */
    .back-to-top {
      display: inline-block;
      font-size: 14px;
      color: #999;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .back-to-top:hover { text-decoration: underline; }

    .about { color: #777; font-size: 14px; max-width: 600px; }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .thumb-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

<header>
  <h1>Luke Chapman</h1>
  <nav>
    <a href="#" id="travels-link" class="active">Travels</a>
    <a href="#" id="colorado-link">Colorado</a>
  </nav>
</header>

<section id="travels-view" class="view active">
  <div class="grid">
    <div class="folder" data-gallery="patagonia">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/sample.jpg">
      <div class="folder-title">Patagonia</div>
      <div class="folder-date">February, 2026</div>
    </div>
  </div>

  <div class="full-divider"></div>
  <a href="#top" class="back-to-top">Back to top ↑</a>
  <div class="about">Minimal travel and portrait photography.</div>
</section>

<section id="colorado-view" class="view">
  <div class="grid">
    <div class="folder" data-gallery="crested-butte">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/people/smiling-man.jpg">
      <div class="folder-title">Crested Butte</div>
      <div class="folder-date">September, 2025</div>
    </div>
  </div>

  <div class="full-divider"></div>
  <a href="#top" class="back-to-top">Back to top ↑</a>
  <div class="about">Minimal travel and portrait photography.</div>
</section>

</div>

<script>
  document.querySelectorAll('.back-to-top').forEach(btn => {
    btn.addEventListener('click', function(e){
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
</script>

</body>
</html>
