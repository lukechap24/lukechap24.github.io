<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #111;
    }

    .page {
      max-width: 950px;
      margin: 0 auto;
      padding: 30px 20px 50px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    nav a,
    .gallery-link,
    .back-link {
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    nav a {
      margin-left: 15px;
    }

    nav a:hover,
    .gallery-link:hover,
    .back-link:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .gallery-title {
      font-size: 16px;
      font-weight: 600;
      margin: 18px 0 4px;
    }

    .gallery-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .thumb {
      aspect-ratio: 4 / 5;
      background: #efefef;
      border: 1px solid #e4e4e4;
    }

    .thumb.large {
      grid-column: span 2;
      aspect-ratio: 8 / 5;
    }

    .about {
      margin-top: 50px;
      padding-top: 15px;
      border-top: 1px solid #eaeaea;
      max-width: 600px;
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 700px) {
      .thumb-grid {
        grid-template-columns: 1fr;
      }

      .thumb.large {
        grid-column: span 1;
        aspect-ratio: 4 / 5;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Luke Chapman</h1>
      <nav>
        <a href="#" id="home-link">Travels</a>
        <a href="#">Moments</a>
      </nav>
    </header>

    <section id="home-view" class="view active">
      <div class="section-title">Travels</div>
      <div class="gallery-list">
        <a class="gallery-link" href="#" id="patagonia-link">Patagonia - February, 2026</a>
        <a class="gallery-link" href="#">Japan - October, 2025</a>
        <a class="gallery-link" href="#">Iceland - June, 2025</a>
      </div>

      <div class="about">
        Minimal travel and portrait photography.
      </div>
    </section>

    <section id="gallery-view" class="view">
      <a class="back-link" href="#" id="back-link">← Back</a>
      <div class="gallery-title">Patagonia - February, 2026</div>
      <div class="gallery-subtitle">8 photographs</div>

      <div class="thumb-grid">
        <div class="thumb large"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb large"></div>
        <div class="thumb"></div>
      </div>
    </section>
  </div>

  <script>
    const homeView = document.getElementById('home-view');
    const galleryView = document.getElementById('gallery-view');

    const patagoniaLink = document.getElementById('patagonia-link');
    const backLink = document.getElementById('back-link');
    const homeLink = document.getElementById('home-link');

    function showHome() {
      homeView.classList.add('active');
      galleryView.classList.remove('active');
    }

    function showGallery() {
      homeView.classList.remove('active');
      galleryView.classList.add('active');
    }

    patagoniaLink.addEventListener('click', function(event) {
      event.preventDefault();
      showGallery();
    });

    backLink.addEventListener('click', function(event) {
      event.preventDefault();
      showHome();
    });

    homeLink.addEventListener('click', function(event) {
      event.preventDefault();
      showHome();
    });
  </script>
</body>
</html>
