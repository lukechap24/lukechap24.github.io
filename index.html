<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke Chapman Photography</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: white; color: #111; }
    .page { max-width: 1000px; margin: 0 auto; padding: 30px 20px 60px; }

    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }

    nav a { margin: 0 10px; text-decoration: none; color: #999; }
    nav a.active { color: #111; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }

    .folder { text-align: center; cursor: pointer; }

    .folder img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      transition: opacity 0.2s ease;
    }

    .folder:hover img {
      opacity: 0.7;
    }

    .folder-title { margin-top: 10px; font-size: 15px; }
    .folder-date { font-size: 12px; color: #999; margin-top: 4px; }

    .about { margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee; color: #777; font-size: 14px; max-width: 600px; }

    .view { display: none; }
    .view.active { display: block; }

    /* GALLERY VIEW */
    .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top:20px; }

    .thumb { aspect-ratio: 4/5; overflow: hidden; cursor: pointer; }

    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.96);
      z-index: 1000;
      padding: 20px;
    }

    .lightbox.open { display: flex; flex-direction: column; }

    .lightbox-content {
      flex:1;
      display:grid;
      grid-template-columns:60px 1fr 60px;
      align-items:center;
    }

    .lightbox-image {
      max-width:100%;
      max-height:75vh;
      opacity:1;
      transition:opacity .25s ease;
    }

    .lightbox-image.fade-out { opacity:0; }

    @media(max-width:800px){ .grid{grid-template-columns:1fr;} .thumb-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="page">

<header>
  <h1>Luke Chapman</h1>
  <nav>
    <a href="#" id="travels-link" class="active">Travels</a>
    <a href="#" id="colorado-link">Colorado</a>
  </nav>
</header>

<!-- TRAVELS -->
<section id="travels-view" class="view active">
  <div class="grid">

    <div class="folder" id="patagonia-link">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/sample.jpg">
      <div class="folder-title">Patagonia</div>
      <div class="folder-date">February, 2026</div>
    </div>

    <div class="folder">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/landscapes/nature-mountains.jpg">
      <div class="folder-title">Japan</div>
      <div class="folder-date">October, 2025</div>
    </div>

    <div class="folder">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/animals/reindeer.jpg">
      <div class="folder-title">Iceland</div>
      <div class="folder-date">June, 2025</div>
    </div>

  </div>

  <div class="about">Minimal travel and portrait photography.</div>
</section>

<!-- COLORADO -->
<section id="colorado-view" class="view">
  <div class="grid">

    <div class="folder">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/people/smiling-man.jpg">
      <div class="folder-title">Crested Butte</div>
      <div class="folder-date">September, 2025</div>
    </div>

    <div class="folder">
      <img src="https://res.cloudinary.com/demo/image/upload/w_800/samples/sheep.jpg">
      <div class="folder-title">Silverthorne</div>
      <div class="folder-date">July, 2025</div>
    </div>

  </div>

  <div class="about">Minimal travel and portrait photography.</div>
</section>

<!-- GALLERY -->
<section id="gallery-view" class="view">
  <a href="#" id="back-link">← Back</a>
  <div class="thumb-grid" id="thumb-grid"></div>
</section>

</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <button id="prev">‹</button>
    <img id="lightbox-img" class="lightbox-image">
    <button id="next">›</button>
  </div>
</div>

<script>
const travelsView=document.getElementById('travels-view');
const coloradoView=document.getElementById('colorado-view');
const galleryView=document.getElementById('gallery-view');

const travelsLink=document.getElementById('travels-link');
const coloradoLink=document.getElementById('colorado-link');
const patagoniaLink=document.getElementById('patagonia-link');
const backLink=document.getElementById('back-link');

const thumbGrid=document.getElementById('thumb-grid');
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');

const photos=[
'https://res.cloudinary.com/demo/image/upload/w_1600/sample.jpg',
'https://res.cloudinary.com/demo/image/upload/w_1600/samples/landscapes/nature-mountains.jpg',
'https://res.cloudinary.com/demo/image/upload/w_1600/samples/animals/reindeer.jpg',
'https://res.cloudinary.com/demo/image/upload/w_1600/samples/people/smiling-man.jpg',
'https://res.cloudinary.com/demo/image/upload/w_1600/samples/sheep.jpg',
'https://res.cloudinary.com/demo/image/upload/w_1600/samples/landscapes/beach-boat.jpg'
];

let index=0;

function show(view){
travelsView.classList.remove('active');
coloradoView.classList.remove('active');
galleryView.classList.remove('active');
view.classList.add('active');
}

function render(){
thumbGrid.innerHTML='';
photos.forEach((p,i)=>{
const d=document.createElement('div');
d.className='thumb';
const img=document.createElement('img');
img.src=p;
d.appendChild(img);
d.onclick=()=>open(i);
thumbGrid.appendChild(d);
});
}

function open(i){
index=i;
lightboxImg.src=photos[i];
lightbox.classList.add('open');
}

function change(i){
lightboxImg.classList.add('fade-out');
setTimeout(()=>{
index=i;
lightboxImg.src=photos[i];
lightboxImg.onload=()=>lightboxImg.classList.remove('fade-out');
},150);
}

document.getElementById('next').onclick=()=>change((index+1)%photos.length);
document.getElementById('prev').onclick=()=>change((index-1+photos.length)%photos.length);

patagoniaLink.onclick=(e)=>{e.preventDefault();show(galleryView);render();};
backLink.onclick=(e)=>{e.preventDefault();show(travelsView);};

travelsLink.onclick=(e)=>{e.preventDefault();show(travelsView);};
coloradoLink.onclick=(e)=>{e.preventDefault();show(coloradoView);};
</script>

</body>
</html>
