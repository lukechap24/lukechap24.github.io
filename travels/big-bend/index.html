<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body id="top">
  <div class="page">
    <header>
      <h1>
        <a href="/travels/" class="home-link">Luke Chapman</a>
      </h1>
      <nav>
        <a href="/travels/" class="active">Travels</a>
        <a href="/colorado/">Colorado</a>
      </nav>
    </header>

    <section>
      <a href="/travels/" class="back-link">← Back</a>

      <div class="gallery-heading">
        <div class="gallery-title" id="gallery-title"></div>
        <div class="gallery-subtitle" id="gallery-subtitle"></div>
      </div>

      <div class="thumb-grid" id="thumb-grid"></div>

      <div class="bottom-meta">
        <a href="#top" class="back-to-top">Back to top ↑</a>
        <div class="full-divider"></div>

        <div class="footer">
          <div class="footer-left">Contact</div>
          <div class="footer-right">
            <a href="https://instagram.com/_l.chap" target="_blank" class="contact-link">Instagram</a>
            <a href="mailto:lukeallenchapman@gmail.com" class="contact-link">Email</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-top">
      <div id="lightbox-title"></div>
      <button id="close-lightbox" class="lightbox-close">✕</button>
    </div>

    <div class="lightbox-content">
      <button id="prev" class="lightbox-arrow">‹</button>
      <div class="lightbox-image-wrap">
        <img id="lightbox-img" class="lightbox-image">
      </div>
      <button id="next" class="lightbox-arrow">›</button>
    </div>
  </div>

  <script>
    const section = "travels";
    const galleryKey = "big-bend";
  </script>

  <script>
    function loadGalleryScript(section, galleryKey) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = `/galleries/${section}/${galleryKey}.js`;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function makeThumb(url) {
      return url.replace("/upload/", "/upload/w_400,h_500,c_fill,q_auto,f_auto/");
    }

    function makeFull(url) {
      return url.replace("/upload/", "/upload/w_1400,q_auto,f_auto/");
    }

    const thumbGrid = document.getElementById("thumb-grid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    let currentIndex = 0;

    function renderThumbnails() {
      gallery.photos.forEach((url, index) => {
        const div = document.createElement("div");
        div.className = "thumb";

        const img = document.createElement("img");
        img.src = makeThumb(url);
        img.onload = () => img.classList.add("loaded");

        div.appendChild(img);
        div.onclick = () => openLightbox(index);

        thumbGrid.appendChild(div);
      });
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightboxImage(index);
      lightbox.classList.add("open");
    }

    function updateLightboxImage(index) {
      lightboxImg.classList.remove("loaded");
      lightboxImg.classList.add("fade-out");

      const newSrc = makeFull(gallery.photos[index]);

      const preload = new Image();
      preload.src = newSrc;
      preload.onload = () => {
        lightboxImg.src = newSrc;
        requestAnimationFrame(() => {
          lightboxImg.classList.remove("fade-out");
          lightboxImg.classList.add("loaded");
        });
      };
    }

    document.getElementById("next").onclick = () => {
      currentIndex = (currentIndex + 1) % gallery.photos.length;
      updateLightboxImage(currentIndex);
    };

    document.getElementById("prev").onclick = () => {
      currentIndex = (currentIndex - 1 + gallery.photos.length) % gallery.photos.length;
      updateLightboxImage(currentIndex);
    };

    document.getElementById("close-lightbox").onclick = () => {
      lightbox.classList.remove("open");
    };

    loadGalleryScript(section, galleryKey).then(() => {
      document.getElementById("gallery-title").textContent = gallery.title;
      document.getElementById("gallery-subtitle").textContent =
        `${gallery.date} · ${gallery.photos.length} photographs`;
      renderThumbnails();
    });
  </script>
</body>
</html>
