<!doctype html>
<html lang="en">
<head>

</head>
<body id="top">
  <div class="page">
   <header>
    <h1>
      <a href="travels.html" class="home-link">Luke Chapman</a>
    </h1>
    <nav>
        <a href="travels.html">Travels</a>
        <a href="colorado.html" class="active">Colorado</a>
      </nav>

    <section>
      <div class="grid">
        <a class="folder" href="gallery.html?gallery=crested-butte">

          <a href="https://instagram.com/_l.chap" target="_blank" class="contact-link">
            Instagram
          </a>
      
          <a href="mailto:lukeallenchapman@gmail.com" class="contact-link">

  <script>
    document.querySelectorAll('.back-to-top').forEach(function(button) {
      button.addEventListener('click', function(event) {
        event.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
